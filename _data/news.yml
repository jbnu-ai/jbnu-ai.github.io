- title: '영상정보신기술연구센터 홈페이지 개편'
  date: 2026-03-01
  category: announcement
  author: 영상정보신기술연구센터
  summary: 영상정보신기술연구센터 공식 홈페이지가 새롭게 개편되었습니다.
  content: |
    영상정보신기술연구센터 공식 홈페이지가 새롭게 개편되었습니다.

    이번 개편을 통해 연구센터 소개, 교수진 및 구성원 안내, 연구 논문 목록, 갤러리, 뉴스 등
    다양한 정보를 보다 편리하게 이용하실 수 있습니다.

    앞으로도 최신 연구 성과와 센터 소식을 신속하게 전달하겠습니다.

- title: '"월드 모델과 피지컬 AI" 튜토리얼 개최'
  date: 2026-03-23
  category: event
  author: 영상정보신기술연구센터
  summary: 컴퓨터AI학부 오일석 교수를 강사로 초청하여 월드 모델과 피지컬 AI를 주제로 특별강연을 개최합니다.
  content: |
    컴퓨터AI학부 오일석 교수를 강사로 초청하여 월드 모델과 피지컬 AI를 주제로 특별강연을 개최합니다.

    **일시:** 2026년 3월 26일 (목) 15:30 ~ 18:30
    **장소:** 공학캠퍼스 레크레이션관 201호 (개조 보건실 공간)

    ---

    **튜토리얼 개요**

    본 강연은 AI가 지각 기반 지능에서 벗어나 상상, 예측, 행동 기반 지능으로 진화하는 방향을 탐구합니다. 세 파트로 구성됩니다.

    1. **인간과 AI의 인지적 월드 모델** — Ha-Schmidhuber의 기초 모델 소개
    2. **현대 월드 모델** — MuZero, Dreamer, Sora, JEPA를 중심으로 잠재 표현과 강화학습 논의
    3. **피지컬 AI 응용** — 로보틱스와 자율주행 사례를 통해 AGI로의 발전 방향 조망

    관심 있는 분들의 많은 참여를 바랍니다.
